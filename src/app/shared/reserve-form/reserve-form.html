<div class="reserve">
  <label class="field">
    Quantity
    <input type="number" min="1" [(ngModel)]="qty" [ngModelOptions]="{ standalone: true }" />
  </label>
  <button type="button" (click)="reserve()" [disabled]="submitting()">
    {{ submitting() ? 'Reserving…' : 'Reserve' }}
  </button>
  @if (lastKey()) {
    <button type="button" class="ghost" (click)="resendSameKey()" [disabled]="resending()">
      {{ resending() ? 'Resending…' : 'Resend same key' }}
    </button>
  }
</div>

@if (demoResult(); as r) {
  <p class="demo-result">{{ r }}</p>
}
