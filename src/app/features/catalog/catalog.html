<section class="page">
  <div class="catalog-head">
    <h1>Event catalog</h1>
    <a class="btn-link" routerLink="/admin">+ Create event</a>
  </div>

  @if (loading()) {
    <p class="muted">Loading…</p>
  } @else if (events().length > 0) {
    <div class="grid">
      @for (ev of events(); track ev.id) {
        <app-event-card [event]="ev" />
      }
    </div>
  } @else if (loadError()) {
    <div class="card empty">
      <p>Couldn't load the catalog.</p>
      <p class="muted">Is the backend running? <button type="button" class="linkish" (click)="load()">Retry</button></p>
    </div>
  } @else {
    <div class="card empty">
      <p>No events yet.</p>
      <p class="muted">Create one in <a routerLink="/admin">Admin</a>.</p>
    </div>
  }
</section>
